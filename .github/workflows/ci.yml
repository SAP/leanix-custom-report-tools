name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-and-build:
    name: Lint & Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # apitoken for tests, issued in test-app-1.leanix.net/TeamCompassDemo, set as a repo secret
      - name: Create lxr.json
        env:
          LXR_TEST_HOST: test-app-1.leanix.net
          LXR_TEST_APITOKEN: ${{ secrets.TEAM_COMPASS_TECHNICAL_USER_TOKEN }}
        run: |
          jq -cn --arg host '${{ env.LXR_TEST_HOST }}' --arg apitoken '${{ env.LXR_TEST_APITOKEN }}' '$ARGS.named' | jq . > lxr.json

      - name: Test
        run: npm test

      - name: Scaffold report with CLI
        env:
          LXR_TEST_HOST: test-app-1.leanix.net
          LXR_TEST_APITOKEN: ${{ secrets.TEAM_COMPASS_TECHNICAL_USER_TOKEN }}
        run: |
          node packages/create-custom-report/dist/index.cjs my-report \
            --id net.leanix.myreport \
            --author "LeanIX GmbH" \
            --title "My Custom Report" \
            --description "A custom report for LeanIX" \
            --packageName my-report \
            --host "$LXR_TEST_HOST" \
            --apitoken "$LXR_TEST_APITOKEN" \
            --no-setupMcpServers \
            --overwrite

      - name: Link vite plugin
        working-directory: packages/vite-plugin
        run: npm link

      - name: Link vite plugin in scaffolded report
        working-directory: my-report
        run: npm link @sap/vite-plugin-leanix-custom-report

      - name: Install scaffolded report dependencies
        working-directory: my-report
        run: npm install

      - name: Build scaffolded report
        working-directory: my-report
        run: npm run build
