name: Release to npmjs

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is required for the automatic generation of provenance statements
      id-token: write
    # The GitHub Actions Environment configured for the trusted publisher
    environment: npmjs:@sap/leanix-custom-report-tools

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.15.0
          # registry-url is required for releasing packages
          registry-url: 'https://registry.npmjs.org'

      - name: Install latest npm cli
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish @sap/vite-plugin-leanix-custom-report
        working-directory: ./packages/vite-plugin
        run: |
          PKG_VERSION=$(node -p "require('./package.json').name + '@' + require('./package.json').version")
          if npm view "${PKG_VERSION}" version &>/dev/null; then
            echo "${PKG_VERSION} already published, skipping."
          else
            npm publish --provenance --access public
          fi

      - name: Publish @sap/create-leanix-custom-report
        working-directory: ./packages/create-custom-report
        run: |
          PKG_VERSION=$(node -p "require('./package.json').name + '@' + require('./package.json').version")
          if npm view "${PKG_VERSION}" version &>/dev/null; then
            echo "${PKG_VERSION} already published, skipping."
          else
            npm publish --provenance --access public
          fi
